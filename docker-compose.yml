services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: pi-docker-sandbox:dev
    security_opt:
      # Default seccomp profile with io_uring syscalls allowed
      - seccomp=./seccomp-allow-io_uring.json
    container_name: pi-docker-sandbox
    # Interactive terminal UI friendly
    tty: true
    stdin_open: true

    environment:
      # Virtual display for headed Playwright browser (viewed via VNC)
      - DISPLAY=:99

    working_dir: /workspace

    # Workspace bind mount (host-editable)
    volumes:
      - ~/projects:/projects
      - ~/.pi/agent/skills:/home/agent/.pi/agent/skills:ro
      - ${TMPDIR:-/tmp}:/tmp/pi-host-tmp:ro

      # Persist the user's entire home across runs (caches, rustup, uv/pipx installs, etc.)
      - pi_agent_sandbox_home:/home/agent

    ports:
      - "5900:5900"

    # Additional ports and read-only bind mounts go in docker-compose.override.yml

volumes:
  pi_agent_sandbox_home:
